name: Generate Daily News

on:
  schedule:
    # Every 2 hours: full update (sales, submissions, top memes/SR, dive bar, waves)
    - cron: '0 */2 * * *'
    # Post-selection: Mon/Wed/Fri at 16:01 UTC (17:01 CET, right after selection)
    - cron: '1 16 * * 1,3,5'
    # Midnight UTC: reset daily counters
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate news
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          OPENSEA_KEY: ${{ secrets.OPENSEA_KEY }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/generate-news.py

      - name: Update hardcoded fallback in HTML
        run: python .github/scripts/update-fallback.py

      - name: Commit updated news
        run: |
          git config user.name "6529news"
          git config user.email "noreply@6529news.xyz"
          git add data/news-latest.json index.html
          git diff --staged --quiet || git commit -m "News update: $(date -u +%Y-%m-%d_%H:%M)"
          git push || echo "Nothing to push"
